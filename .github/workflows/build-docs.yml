# Reusable workflow: build docs site and deploy to GitHub Pages.
# Call from your root .github/workflows/ to build and deploy docs.
#
# Usage from root workflow:
#   jobs:
#     build:
#       uses: ./packages/laravel-docit/.github/workflows/build-docs.yml
#       with:
#         docit-path: packages/laravel-docit
#
# For Composer-installed docit (vendor/christhompsontldr/laravel-docit):
#   docit-path: vendor/christhompsontldr/laravel-docit
#
# GitHub Pages: Set repo Settings → Pages → Source to "GitHub Actions"

name: Build docs (docit)

on:
  workflow_call:
    inputs:
      docit-path:
        description: 'Path to docit package (relative to repo root)'
        required: false
        default: 'packages/laravel-docit'
        type: string
      output-dir:
        description: 'Output directory (DOCIT_OUTPUT_DIR). Default docs/dist.'
        required: false
        default: 'docs/dist'
        type: string
      commit:
        description: 'Commit output instead of deploying via Actions (for Deploy from a branch)'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify docit package exists
        run: |
          if [ ! -d "${{ inputs.docit-path }}" ]; then
            echo "::error::${{ inputs.docit-path }} not found. Ensure docit is at the expected path."
            exit 1
          fi

      - name: Build docs
        env:
          DOCIT_PROJECT_ROOT: ${{ github.workspace }}
          DOCIT_OUTPUT_DIR: ${{ inputs.output-dir }}
        run: php ${{ inputs.docit-path }}/bin/build-docs

      - name: Upload artifact
        if: ${{ !inputs.commit }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ inputs.output-dir }}

      - name: Commit output
        if: inputs.commit
        uses: EndBug/add-and-commit@v9
        with:
          add: ${{ inputs.output-dir }}
          message: Build docs site

  deploy:
    if: ${{ !inputs.commit }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment: github-pages
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
